name: Validate documentation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Validate anonymous proposal gateway
        run: python -m unittest discover -s tools/region-proposal-gateway/tests -v

      - name: Install documentation dependencies
        run: pip install mkdocs-material mkdocs-macros-plugin pyyaml mkdocs-glightbox pymdown-extensions shapely==2.0.6 mkdocs-redirects==1.2.2

      - name: Validate exclusive national partition
        run: node scripts/validate-regions.js

      - name: Verify generated geometry
        run: |
          python scripts/verify-region-geometry.py
          python scripts/verify-region-geometry.py --partition docs/assets/regions/canada-region-partition-digital.geojson

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Validate region editor
        run: |
          node --test tests/editor/*.test.mjs
          node --check docs/config/editor/app.js
          node --check docs/config/editor/issue.js

      - name: Build documentation
        run: mkdocs build --strict

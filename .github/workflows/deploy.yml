name: Deploy MkDocs site

on:
  push:
    branches: [ main ]  # change to master if your branch is named master
  release:
    types: [ published ]  # redeploy site when new firmware is released
  workflow_dispatch:

permissions:
  contents: write       # needed so the action can push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install MkDocs + Material
        run: |
          pip install mkdocs-material

      - name: Install Mkdocs-plugin
        run: |
          pip install mkdocs-macros-plugin pyyaml mkdocs-glightbox pymdown-extensions shapely==2.0.6 mkdocs-redirects==1.2.2

      - name: Validate MeshCore Canada proposal service
        shell: bash
        run: |
          python -m unittest discover -s tools/region-proposal-gateway/tests -v
          node --test tests/editor/*.test.mjs
          node --check docs/config/editor/app.js
          node --check docs/config/editor/issue.js
          node --check docs/javascripts/community-submission.js
          node --check docs/javascripts/submission-form.js
          if git grep -n -E 'canadaverse\.org|regions-api\.meshcore\.ca|/api/meshcore-regions/proposals|192\.168\.0\.111|/home/neonx|splashpage' -- \
            docs/config/editor docs/javascripts docs/submit-idea.md \
            tools/region-proposal-gateway instructions.md; then
            echo 'Production submission files must use only the approved MeshCore Canada endpoint.' >&2
            exit 1
          fi

      - name: Validate exclusive national partition
        run: node scripts/validate-regions.js

      - name: Verify generated geometry
        run: |
          python scripts/verify-region-geometry.py
          python scripts/verify-region-geometry.py --partition docs/assets/regions/canada-region-partition-digital.geojson

      - name: Validate community submission helper
        run: python scripts/validate_community_submission.py

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: meshcore.ca

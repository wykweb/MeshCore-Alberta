name: meshcore-submissions

services:
  submission-gateway:
    build:
      context: .
    image: "meshcore-canada/submission-gateway:${SUBMISSION_IMAGE_TAG:-local}"
    restart: unless-stopped
    read_only: true
    init: true
    user: "10001:10001"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 384m
    cpus: 1.0
    stop_grace_period: 20s
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    # The MeshCore Canada host's Caddy service reaches the API only on loopback.
    network_mode: host
    environment:
      LISTEN_HOST: 127.0.0.1
      PORT: "8787"
      BASE_PATH: /api/meshcore-canada/submissions
      ALLOWED_ORIGINS: https://meshcore.ca,https://config.meshcore.ca
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:?Set TURNSTILE_SITE_KEY in the protected environment file}"
      TURNSTILE_EXPECTED_HOSTNAMES: meshcore.ca,config.meshcore.ca
      TURNSTILE_SECRET_FILE: /run/secrets/turnstile
      GITHUB_APP_CLIENT_ID: "${GITHUB_APP_CLIENT_ID:?Set GITHUB_APP_CLIENT_ID in the protected environment file}"
      GITHUB_APP_INSTALLATION_ID: "${GITHUB_APP_INSTALLATION_ID:?Set GITHUB_APP_INSTALLATION_ID in the protected environment file}"
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github-app.pem
      MEMBERSHIP_PATH: /data/regions/canada-region-membership.csv
      CATALOG_PATH: /data/regions/canada-regions.json
      CELLS_DIR: /data/regions/cells
      LEDGER_PATH: /state/submissions.sqlite3
      RATE_LIMIT: "5"
      RATE_WINDOW_SECONDS: "3600"
      PRE_RATE_LIMIT: "30"
      PRE_RATE_WINDOW_SECONDS: "300"
      GLOBAL_PRE_RATE_LIMIT: "300"
      GLOBAL_PRE_RATE_WINDOW_SECONDS: "60"
      MAX_WORKERS: "32"
      # Only the local Caddy process may supply one X-Forwarded-For value.
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
    volumes:
      - type: bind
        source: "${MCC_REPO_ROOT:?Set MCC_REPO_ROOT to the absolute repository checkout}/docs/assets/regions"
        target: /data/regions
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${SUBMISSION_STATE_DIR:-/var/lib/meshcore-submissions}"
        target: /state
        bind:
          create_host_path: false
      - type: bind
        source: "${SUBMISSION_SECRET_DIR:-/etc/meshcore-submissions}/turnstile"
        target: /run/secrets/turnstile
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${SUBMISSION_SECRET_DIR:-/etc/meshcore-submissions}/github-app.pem"
        target: /run/secrets/github-app.pem
        read_only: true
        bind:
          create_host_path: false
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

site_name: MeshCore Canada
site_url: https://meshcore.ca
repo_name: MeshCore Canada
repo_url: https://github.com/MeshCore-ca/MeshCore-Canada

theme:
  name: material
  favicon: assets/MeshCore-Canada-Favicon.png       # optional
  logo: assets/MeshCore-Canada-Favicon.png             # optional
  palette:
      scheme: slate
      primary: indigo
      accent: blue
  features:
    - navigation.top
    - toc.follow

extra_css:
  - stylesheets/extra.css
  - assets/regions/regions.css

extra_javascript:
  - assets/regions/regions.js

plugins:
  - search
  - redirects:
      redirect_maps:
        regions/index.md: config/index.md
        regions/setup.md: config/index.md
        regions/map.md: config/map.md
        regions/standard.md: config/standard.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - Analyzer & MQTT:
      - Overview: analyzer/intro.md
      - Data Collection & Access: analyzer/data-collection-access.md
      - Check Your Observer: analyzer/verify.md
      - Troubleshooting: analyzer/troubleshooting.md
      - Broker Reference: analyzer/broker-reference.md
      - IATA Region Codes: analyzer/iata-codes.md
      - RemoteTerm: analyzer/remoteterm.md
      - Build Guides:
          - MCtoMQTT Script: analyzer/builds/mctomqtt.md
          - MeshCore-HA: analyzer/builds/meshcore-ha.md
          - MQTT Firmware: analyzer/builds/mqtt-firmware.md
          - PyMC: analyzer/builds/pymc.md
  - Hardware: 
      - Overview: hardware/overview.md
      - Antenna: hardware/recommended-antenna.md
      - Companion Nodes: hardware/recommended-companions.md
      - Repeater Nodes:
          - Repeater Nodes:  hardware/recommended-repeaters.md
          - Repeater Mounting Options: hardware/repeater-mounting-options.md
          - Repeater Solar Batteries: hardware/repeater-solar-batteries.md
          - 300mW Solar Repeater Build Guide: hardware/repeater-solar-300mw-diy-build.md
          - 1W Solar Repeater Build Guide: hardware/repeater-solar-1w-diy-build.md
      - Wire Connector Types: hardware/wire-connector-types.md
  
  - MeshCore:
      - General:
          - Overview: meshcore/general-overview.md
          - MeshCore FAQ: meshcore/general-faq.md
          - MeshCore How-To: meshcore/general-howto.md
          - MeshCore Roles: meshcore/general-meshcore-roles.md
          - Repeater Configurator: /config/
      - Firmware Guides:
          - Flashing a Companion:  meshcore/flash-companion.md
          - Flashing a Repeater: meshcore/flash-repeater.md
          - Updating a Repeater (OTA): meshcore/update-repeater-ota.md
          - Generating a Repeater ID: meshcore/generate-repeater-id.md
          - Flashing a Room Server: meshcore/flash-room-server.md
          - RAK4631 Custom Display Firmware: meshcore/firmware-rak-custom-display.md
          - Heltec V3 Wi-Fi Firmware:  meshcore/firmware-heltec-v3-wifi.md

  - Mesh Directory:
      - Overview: provinces/index.md
      - British Columbia: provinces/british-columbia.md
      - Alberta: provinces/alberta.md
      - Saskatchewan: provinces/saskatchewan.md
      - Manitoba: provinces/manitoba.md
      - Ontario: provinces/ontario.md
      - Quebec: provinces/quebec.md
      - New Brunswick: provinces/new-brunswick.md
      - Nova Scotia: provinces/nova-scotia.md
      - Prince Edward Island: provinces/prince-edward-island.md
      - Newfoundland and Labrador: provinces/newfoundland-and-labrador.md
      - Territories (YT / NT / NU): provinces/territories.md
  - Resources:
      - Getting Started: resources/getting-started.md
      - Useful Links: resources/links.md
      - Glossary: resources/glossary.md
  - Forum: https://forum.meshcore.ca/
  - Contributing: contributing.md
